<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARWAN ATROUSHI | MEGA POS</title>
    <style>
        :root { --main: #00f2ff; --bg: #05070a; --card: #111418; --border: #2d333b; }
        body { background: var(--bg); color: #adbac7; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Navigation */
        nav { width: 200px; background: #000; border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { padding: 12px 20px; color: #768390; cursor: pointer; font-size: 13px; border-right: 3px solid transparent; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--card); color: var(--main); border-right-color: var(--main); }

        /* Main View */
        main { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: #000; }
        .search-container { position: relative; width: 40%; }
        .search-bar { width: 100%; background: #1c2128; border: 1px solid var(--border); border-radius: 6px; padding: 8px 15px; color: white; outline: none; }

        /* Content Area */
        .content { flex: 1; display: grid; grid-template-columns: 1fr 380px; gap: 15px; padding: 15px; overflow: hidden; }
        .products-area { overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* Categories Bar */
        .categories { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .cat-btn { background: var(--card); border: 1px solid var(--border); padding: 6px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .cat-btn.active { background: var(--main); color: black; border-color: var(--main); }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        
        /* Product Card */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--main); transform: translateY(-3px); }
        .card img { width: 100%; height: 90px; object-fit: cover; }
        .card-body { padding: 8px; text-align: center; }
        .card-name { font-size: 13px; font-weight: bold; display: block; height: 35px; overflow: hidden; }
        .card-price { color: var(--main); font-size: 12px; margin-top: 5px; display: block; }

        /* Receipt Panel */
        .receipt { background: #000; border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; padding: 15px; }
        .cart-list { flex: 1; overflow-y: auto; margin-top: 10px; border-top: 1px solid var(--border); }
        .cart-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1c2128; font-size: 13px; }
        .total-box { border-top: 2px solid var(--main); padding-top: 15px; }
        .btn-pay { width: 100%; padding: 12px; background: var(--main); color: black; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; }

        @media (max-width: 900px) { .content { grid-template-columns: 1fr; } nav { display: none; } }
    </style>
</head>
<body>

    <nav>
        <div style="padding: 20px; text-align: center;">
            <div style="font-weight: 900; color: var(--main); border: 2px solid var(--main); border-radius: 50%; width: 50px; height: 50px; line-height: 50px; margin: 0 auto 10px;">M</div>
            <div style="font-size: 11px;">MARWAN ATROUSHI</div>
        </div>
        <div class="nav-item active">🛒 المبيعات</div>
        <div class="nav-item">📦 المخزن</div>
        <div class="nav-item">📊 الحسابات</div>
        <div class="nav-item">👥 العملاء</div>
        <div style="margin-top: auto; padding: 20px; font-size: 10px; opacity: 0.5;">Version 5.0 PRO</div>
    </nav>

    <main>
        <header>
            <div class="search-container">
                <input type="text" id="search" class="search-bar" placeholder="ابحث عن 500+ منتج هنا..." oninput="filterProducts()">
            </div>
            <div id="clock" style="color: var(--main); font-family: monospace;"></div>
        </header>

        <div class="content">
            <div class="products-area">
                <div class="categories">
                    <button class="cat-btn active">الكل</button>
                    <button class="cat-btn">هواتف</button>
                    <button class="cat-btn">اكسسوارات</button>
                    <button class="cat-btn">کمیبوتر</button>
                    <button class="cat-btn">نرجيلة</button>
                </div>
                <div class="grid" id="p-grid"></div>
            </div>

            <div class="receipt">
                <h4 style="margin:0; text-align:center; color: var(--main);">فاتورة MARWAN</h4>
                <div class="cart-list" id="cart"></div>
                <div class="total-box">
                    <div style="display:flex; justify-content:space-between; font-size:22px; font-weight:bold; margin-bottom:10px;">
                        <span>Total:</span>
                        <span><span id="total-val">0</span> IQD</span>
                    </div>
                    <button class="btn-pay" onclick="saveSale()">تأكيد البيع</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // لێرە تو دشێی ب هزاران کەلوپەلان زێدە بکەی
        const products = [];
        const names = ["iPhone", "Samsung", "iPad", "Watch", "AirPods", "MacBook", "Gaming PC", "Mouse", "Keyboard", "Camera"];
        
        // دروستکرنا 500 کەلوپەلان ب شێوەیەکێ ئۆتۆماتیکی بۆ تاقیکردنێ
        for(let i=1; i<=500; i++) {
            products.push({
                id: i,
                n: names[Math.floor(Math.random()*names.length)] + " Model " + i,
                p: Math.floor(Math.random() * 2000000) + 10000,
                img: `https://picsum.photos/seed/${i}/200/150`
            });
        }

        let total = 0;
        const grid = document.getElementById('p-grid');

        function renderProducts(list) {
            grid.innerHTML = '';
            list.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${p.img}">
                    <div class="card-body">
                        <span class="card-name">${p.n}</span>
                        <span class="card-price">${p.p.toLocaleString()} IQD</span>
                    </div>
                `;
                card.onclick = () => {
                    total += p.p;
                    document.getElementById('total-val').innerText = total.toLocaleString();
                    const r = document.createElement('div');
                    r.className = 'cart-row';
                    r.innerHTML = `<span>${p.n}</span><span>${p.p.toLocaleString()}</span>`;
                    document.getElementById('cart').appendChild(r);
                };
                grid.appendChild(card);
            });
        }

        function filterProducts() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = products.filter(p => p.n.toLowerCase().includes(query));
            renderProducts(filtered);
        }

        function saveSale() {
            if(total === 0) return;
            alert("تم الحفظ بنجاح!");
            location.reload();
        }

        renderProducts(products);
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
