<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARWAN ATROUSHI | ADVANCED POS</title>
    <style>
        :root { --main: #00f2ff; --bg: #020205; --card: rgba(20,20,20,0.9); }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 300px; background: #000; border-left: 1px solid #222; padding: 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 5px 0 20px rgba(0,0,0,0.5); }
        .avatar { width: 110px; height: 110px; border: 2px solid var(--main); border-radius: 20px; margin-bottom: 15px; background: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=200') center/cover; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        .stats-box { background: var(--card); border: 1px solid #333; border-radius: 10px; width: 100%; padding: 10px; margin-bottom: 20px; text-align: center; }
        main { flex: 1; padding: 25px; display: grid; grid-template-columns: 1fr 380px; gap: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; overflow-y: auto; padding-right: 5px; }
        .item { background: var(--card); border: 1px solid #222; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .item:hover { border-color: var(--main); transform: translateY(-5px); background: rgba(0,242,255,0.05); }
        .receipt { background: #000; border: 1px solid var(--main); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; position: relative; }
        .items-list { flex: 1; overflow-y: auto; margin: 15px 0; border-top: 1px solid #222; padding-top: 10px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .total { font-size: 32px; color: var(--main); font-weight: bold; text-align: center; margin: 20px 0; border-top: 2px solid var(--main); padding-top: 15px; }
        .btn-exe { width: 100%; padding: 18px; background: var(--main); color: #000; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-exe:hover { box-shadow: 0 0 25px var(--main); transform: scale(1.02); }
        .menu-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: #111; border: 1px solid #333; border-radius: 10px; color: #fff; cursor: pointer; text-align: right; transition: 0.2s; }
        .menu-btn:hover { background: var(--main); color: #000; }
    </style>
</head>
<body>
    <nav>
        <div class="avatar"></div>
        <h3 style="color:var(--main); margin:0; letter-spacing:1px;">MARWAN ATROUSHI</h3>
        <p style="font-size:11px; opacity:0.6; margin-bottom:20px;">SYSTEM OWNER / CEO</p>
        
        <div class="stats-box">
            <div style="font-size:10px; opacity:0.7;">کۆی کڕیارێن ئەڤڕۆ</div>
            <div id="customer-count" style="font-size:24px; color:var(--main); font-weight:bold;">0</div>
        </div>

        <button class="menu-btn" onclick="alert('Dashboard is active for Marwan')">📊 داشبۆردا گشتی</button>
        <button class="menu-btn" onclick="alert('Inventory management coming soon')">📦 کۆگا و مەخزەن</button>
        <button class="menu-btn" onclick="alert('Financial reports secured')">🧾 ڕاپۆرتێن دارایی</button>
        <button class="menu-btn" onclick="location.reload()">🔄 نووکرنا سیستەمی</button>
    </nav>

    <main>
        <div>
            <h2 style="margin-top:0;">لیستا کەلوپەلان</h2>
            <div class="grid" id="menu"></div>
        </div>

        <div class="receipt">
            <div style="text-align:center;">
                <h3 style="margin:0; color:var(--main);">MARWAN SYSTEMS</h3>
                <small id="live-time" style="opacity:0.5;"></small>
            </div>
            
            <div class="items-list" id="cart">
                <p id="empty-msg" style="text-align:center; opacity:0.3; margin-top:50px;">سەبەتە یا خاڵییە</p>
            </div>

            <div class="total">Total: <span id="total-price">0</span> <small style="font-size:12px;">IQD</small></div>
            <button class="btn-exe" onclick="processSale()">تەمامکرنا فرۆشتنێ (Execute)</button>
        </div>
    </main>

    <script>
        const products = [
            { n: "iPhone 15 Pro Max", p: 1650000 }, { n: "MacBook Air M2", p: 1850000 },
            { n: "iPad Pro", p: 1100000 }, { n: "Apple Watch Ultra", p: 950000 },
            { n: "AirPods Pro 2", p: 350000 }, { n: "Samsung S24 Ultra", p: 1450000 }
        ];

        let total = 0;
        let count = localStorage.getItem('m_customers') || 0;
        document.getElementById('customer-count').innerText = count;

        const cartDiv = document.getElementById('cart');
        const totalSpan = document.getElementById('total-price');

        products.forEach(p => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<h4>${p.n}</h4><p style="color:var(--main)">${p.p.toLocaleString()} IQD</p>`;
            div.onclick = () => {
                document.getElementById('empty-msg')?.remove();
                total += p.p;
                totalSpan.innerText = total.toLocaleString();
                const row = document.createElement('div');
                row.className = 'row';
                row.innerHTML = `<span>${p.n}</span> <span>${p.p.toLocaleString()}</span>`;
                cartDiv.appendChild(row);
            };
            document.getElementById('menu').appendChild(div);
        });

        function processSale() {
            if(total === 0) return alert("ببۆره، کڕین نەهاتییە دەستنیشانکرن!");
            count++;
            localStorage.setItem('m_customers', count);
            alert(`سەرکەفتی بوو!\nپسۆلا ژمارە #${count} ب ناڤێ MARWAN ATROUSHI هاتە تۆمارکرن.`);
            location.reload();
        }

        setInterval(() => {
            document.getElementById('live-time').innerText = new Date().toLocaleString('ku-IQ');
        }, 1000);
    </script>
</body>
</html>
