<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARWAN PRO POS</title>
    <style>
        :root { --main: #00f2ff; --bg: #0d1117; --card: #161b22; --border: #30363d; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        nav { width: 220px; background: #000; border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-btn { padding: 15px 20px; color: #8b949e; cursor: pointer; border-right: 4px solid transparent; transition: 0.3s; }
        .nav-btn.active { background: var(--card); color: var(--main); border-right-color: var(--main); }

        /* Main */
        main { flex: 1; display: flex; flex-direction: column; }
        header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: #000; }
        
        /* Pages */
        .page { display: none; flex: 1; padding: 20px; overflow-y: auto; }
        .page.active { display: flex; flex-direction: column; }

        /* POS Grid */
        .pos-layout { display: grid; grid-template-columns: 1fr 350px; gap: 20px; height: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; text-align: center; padding-bottom: 10px; }
        .card:active { transform: scale(0.95); border-color: var(--main); }
        .card img { width: 100%; height: 100px; object-fit: cover; }

        /* Cart */
        .cart-panel { background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; }
        .cart-list { flex: 1; overflow-y: auto; margin: 15px 0; border-top: 1px solid #333; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 14px; }
        
        .btn-pay { width: 100%; padding: 15px; background: var(--main); color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* Forms */
        input, select { background: #1c2128; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; margin-bottom: 10px; }

        @media (max-width: 900px) { .pos-layout { grid-template-columns: 1fr; } nav { display: none; } }
    </style>
</head>
<body>

    <nav>
        <div style="padding: 20px; text-align: center; color: var(--main); font-weight: bold;">MARWAN POS</div>
        <div class="nav-btn active" onclick="showPage('pos')">🛒 فرۆشتن (POS)</div>
        <div class="nav-btn" onclick="showPage('inventory')">📦 کۆگا (Stock)</div>
        <div class="nav-btn" onclick="showPage('reports')">📊 ڕاپۆرت</div>
    </nav>

    <main>
        <header>
            <div id="page-title">سیستەمێ فرۆشتنێ</div>
            <div id="clock">00:00:00</div>
        </header>

        <div id="pos" class="page active">
            <div class="pos-layout">
                <div class="grid" id="product-grid"></div>
                <div class="cart-panel">
                    <h4 style="margin:0; color:var(--main);">پسۆلا نوو</h4>
                    <div class="cart-list" id="cart-list"></div>
                    <div style="font-size: 24px; font-weight: bold; margin-bottom: 15px;">Total: <span id="total-price">0</span> IQD</div>
                    <button class="btn-pay" onclick="checkout()">تەمامکرنا فرۆشتنێ</button>
                </div>
            </div>
        </div>

        <div id="inventory" class="page">
            <h3>زێدەکرنا کەلوپەلان</h3>
            <div style="display:flex; flex-direction:column; max-width: 400px;">
                <input type="text" id="p-name" placeholder="ناڤێ کەلوپەلی">
                <input type="number" id="p-price" placeholder="بها (IQD)">
                <input type="text" id="p-img" placeholder="لێنکێ وێنەی (URL)">
                <button class="btn-pay" onclick="addProduct()">زێدە بکە د لیستێ دا</button>
            </div>
        </div>

        <div id="reports" class="page">
            <h3>ڕاپۆرتا گشتی</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div style="background:var(--card); padding:20px; border-radius:10px;">
                    <small>کۆی پارەیێ هاتى</small>
                    <div id="total-revenue" style="font-size:30px; color:var(--main);">0 IQD</div>
                </div>
                <div style="background:var(--card); padding:20px; border-radius:10px;">
                    <small>کۆی کڕیاران</small>
                    <div id="total-sales" style="font-size:30px; color:var(--main);">0</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Data Storage
        let products = JSON.parse(localStorage.getItem('m_prods')) || [
            { n: "iPhone 15", p: 1650000, img: "https://images.unsplash.com/photo-1696446701796-da61225697cc?w=200" },
            { n: "Samsung S24", p: 1450000, img: "https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?w=200" }
        ];
        let cart = [];
        let total = 0;
        let stats = JSON.parse(localStorage.getItem('m_stats')) || { revenue: 0, sales: 0 };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            document.getElementById('page-title').innerText = event.currentTarget.innerText;
            if(id === 'reports') updateReports();
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            products.forEach((p, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${p.img}"> <div style="padding:10px;"><b>${p.n}</b><br><span style="color:var(--main)">${p.p.toLocaleString()}</span></div>`;
                card.onclick = () => addToCart(p);
                grid.appendChild(card);
            });
        }

        function addToCart(p) {
            cart.push(p);
            total += p.p;
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-list');
            list.innerHTML = '';
            cart.forEach(item => {
                const row = document.createElement('div');
                row.className = 'cart-item';
                row.innerHTML = `<span>${item.n}</span><span>${item.p.toLocaleString()}</span>`;
                list.appendChild(row);
            });
            document.getElementById('total-price').innerText = total.toLocaleString();
        }

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = parseInt(document.getElementById('p-price').value);
            const img = document.getElementById('p-img').value || 'https://via.placeholder.com/150';
            if(!name || !price) return alert("هیڤییە داتایان تەمام بکە");
            products.push({ n: name, p: price, img: img });
            localStorage.setItem('m_prods', JSON.stringify(products));
            alert("کەلوپەل هاتە زێدەکرن!");
            renderProducts();
            showPage('pos');
        }

        function checkout() {
            if(cart.length === 0) return alert("سەبەتە خاڵییە!");
            stats.sales += 1;
            stats.revenue += total;
            localStorage.setItem('m_stats', JSON.stringify(stats));
            alert("فرۆشتن ب سەرکەفتی هاتە تۆمارکرن!");
            cart = []; total = 0;
            updateCartUI();
        }

        function updateReports() {
            document.getElementById('total-revenue').innerText = stats.revenue.toLocaleString() + " IQD";
            document.getElementById('total-sales').innerText = stats.sales;
        }

        // Init
        renderProducts();
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
