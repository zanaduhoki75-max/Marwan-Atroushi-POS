<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARWAN POS | FULL PRO SYSTEM</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0d1117; --card: #161b22; --border: #30363d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Side Navigation */
        nav { width: 240px; background: #000; border-left: 1px solid var(--border); display: flex; flex-direction: column; padding-top: 20px; }
        .nav-link { padding: 15px 25px; color: #8b949e; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-link:hover, .nav-link.active { background: var(--card); color: var(--neon); border-right: 4px solid var(--neon); }
        
        /* Main View */
        main { flex: 1; display: flex; flex-direction: column; }
        header { height: 70px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: #000; }
        .search-input { background: #0d1117; border: 1px solid var(--border); border-radius: 20px; padding: 8px 20px; color: white; width: 250px; }

        /* Dashboard Content */
        .content { flex: 1; padding: 20px; overflow-y: auto; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; align-content: start; }
        
        /* Modern Card */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--neon); transform: translateY(-5px); }
        .card img { width: 100%; height: 110px; object-fit: cover; border-bottom: 1px solid var(--border); }
        .card-body { padding: 10px; text-align: center; }
        .card-name { font-weight: bold; font-size: 14px; display: block; }
        .card-price { color: var(--neon); font-size: 13px; margin-top: 5px; display: block; }

        /* Receipt Sidebar (Right) */
        .pos-receipt { background: #000; border: 1px solid var(--border); border-radius: 15px; display: flex; flex-direction: column; padding: 20px; }
        .cart-list { flex: 1; overflow-y: auto; margin: 15px 0; border-top: 1px dashed var(--border); padding-top: 10px; }
        .cart-item { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
        
        .totals { border-top: 2px solid var(--neon); padding-top: 15px; }
        .total-row { display: flex; justify-content: space-between; font-size: 22px; font-weight: bold; color: var(--neon); }
        .btn-pay { width: 100%; padding: 15px; background: var(--neon); color: black; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; margin-top: 15px; cursor: pointer; box-shadow: 0 0 15px rgba(0,242,255,0.2); }

        /* Stats Boxes */
        .stats-area { display: flex; gap: 10px; margin-bottom: 20px; grid-column: span 2; }
        .stat-box { background: var(--card); flex: 1; padding: 15px; border-radius: 12px; border-right: 3px solid var(--neon); }

        @media (max-width: 1000px) {
            .content { grid-template-columns: 1fr; }
            nav { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div style="text-align:center; padding-bottom: 20px;">
            <div style="width:70px; height:70px; background:var(--neon); border-radius:50%; margin: 0 auto 10px; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; font-size:24px;">M</div>
            <h3 style="margin:0; font-size:16px;">MARWAN ATROUSHI</h3>
        </div>
        <div class="nav-link active">🛒 فرۆشتن</div>
        <div class="nav-link">📦 کۆگا</div>
        <div class="nav-link">📊 حسابات</div>
        <div class="nav-link">👥 کڕیار</div>
        <div class="nav-link">⚙️ ڕێکخستن</div>
    </nav>

    <main>
        <header>
            <input type="text" class="search-input" placeholder="لێگەڕیان...">
            <div id="live-clock" style="color:var(--neon); font-family:monospace;"></div>
        </header>

        <div class="content">
            <div class="stats-area">
                <div class="stat-box"><small>کۆی فرۆشتن</small><div id="total-sales-count" style="font-size:20px; font-weight:bold;">0</div></div>
                <div class="stat-box"><small>کۆی پارە</small><div id="total-money" style="font-size:20px; font-weight:bold; color:var(--neon);">0</div></div>
            </div>

            <div class="products-grid" id="p-grid"></div>

            <div class="pos-receipt">
                <h4 style="text-align:center; margin:0;">پسۆلا فرۆشتنێ</h4>
                <div class="cart-list" id="cart"></div>
                <div class="totals">
                    <div class="total-row">
                        <span>Total:</span>
                        <span id="grand-total">0</span>
                    </div>
                    <button class="btn-pay" onclick="checkout()">تەمامکرنا فرۆشتنێ</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const products = [
            { id: 1, n: "iPhone 15 Pro", p: 1650000, img: "https://images.unsplash.com/photo-1696446701796-da61225697cc?w=200" },
            { id: 2, n: "Samsung S24", p: 1450000, img: "https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?w=200" },
            { id: 3, n: "Apple Watch", p: 850000, img: "https://images.unsplash.com/photo-1544117518-30dd5f2f309e?w=200" },
            { id: 4, n: "MacBook Air", p: 1850000, img: "https://images.unsplash.com/photo-1517336712461-120516447819?w=200" },
            { id: 5, n: "AirPods Pro", p: 350000, img: "https://images.unsplash.com/photo-1588423770670-4599e992cc17?w=200" },
            { id: 6, n: "Gaming PC", p: 2500000, img: "https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=200" }
        ];

        let cartData = [];
        let total = 0;
        let saleCount = localStorage.getItem('m_count') || 0;
        let totalCash = localStorage.getItem('m_cash') || 0;

        document.getElementById('total-sales-count').innerText = saleCount;
        document.getElementById('total-money').innerText = parseInt(totalCash).toLocaleString() + " IQD";

        const grid = document.getElementById('p-grid');
        products.forEach(p => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<img src="${p.img}"><div class="card-body"><span class="card-name">${p.n}</span><span class="card-price">${p.p.toLocaleString()} IQD</span></div>`;
            div.onclick = () => addToCart(p);
            grid.appendChild(div);
        });

        function addToCart(p) {
            cartData.push(p);
            updateCart();
        }

        function updateCart() {
            const cartDiv = document.getElementById('cart');
            cartDiv.innerHTML = '';
            total = 0;
            cartData.forEach((item, index) => {
                total += item.p;
                const row = document.createElement('div');
                row.className = 'cart-item';
                row.innerHTML = `<span>${item.n}</span><span>${item.p.toLocaleString()}</span>`;
                cartDiv.appendChild(row);
            });
            document.getElementById('grand-total').innerText = total.toLocaleString();
        }

        function checkout() {
            if(cartData.length === 0) return alert("سەبەتە یا خاڵییە!");
            saleCount++;
            totalCash = parseInt(totalCash) + total;
            localStorage.setItem('m_count', saleCount);
            localStorage.setItem('m_cash', totalCash);
            alert("فرۆشتن ب سەرکەفتی ئەنجام دا ب ناڤێ Marwan Atroushi");
            location.reload();
        }

        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('ku-IQ');
        }, 1000);
    </script>
</body>
</html>
